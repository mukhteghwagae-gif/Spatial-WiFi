# ── Gradle JVM ────────────────────────────────────────────────────────────────
org.gradle.jvmargs=-Xmx4g -Xms512m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# ── Gradle build performance ──────────────────────────────────────────────────
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true
org.gradle.daemon=true

# ── AndroidX ──────────────────────────────────────────────────────────────────
android.useAndroidX=true

# ── Kotlin ────────────────────────────────────────────────────────────────────
kotlin.code.style=official

# ── R8 / Shrinking ────────────────────────────────────────────────────────────
android.enableR8.fullMode=true

# ── Warnings → errors (keeps the codebase clean) ─────────────────────────────
# Uncomment to enforce strict Lint on CI:
# android.lint.abortOnError=true

# ── Non-transitive R classes (faster builds) ──────────────────────────────────
android.nonTransitiveRClass=true
android.nonFinalResIds=false
